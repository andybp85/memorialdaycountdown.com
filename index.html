<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <meta content="How long until Memorial Day?" name="description">
    <meta content="#101e4a" name="theme-color">
    <meta name="darkreader-lock">
    <meta content="Memorial Day Countdown" property="og:title">
    <meta content="https://www.memorialdaycountdown.com" property="og:url">
    <title>Memorial Day Countdown</title>
    <link href="/css/normalize.css" rel="stylesheet">
    <link href="/favicon.ico" rel="icon" sizes="any">
    <style>
        html {
            background-color: #101e4a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        }

        h1 {
            line-height: 1.2;
            text-transform: uppercase;
        }

        #wrapper {
            align-items: center;
            color: #ffdd4a;
            display: flex;
            flex-direction: column;
            font-size: 18px;
            height: 100%;
            line-height: 1.6;
            margin: 40px auto;
            max-width: 650px;
            padding: 0 10px;
            width: 100%;
        }

        ul {
            margin-left: 0;
            padding-left: 0;
        }

        li {
            display: inline-block;
            list-style-type: none;
            padding: 1em;
            text-align: center;
            text-transform: uppercase;
        }

        li span {
            display: block;
            font-size: 3rem;
        }

        li:first-child {
            padding-left: 0;
        }

        @media (max-width: 560px) {
            #wrapper {
                min-width: 300px;
                text-align: center;
                width: 300px;
            }

            #countdown {
                width: 240px;
            }

            #countdown li {
                padding: 15px 0;
                width: 48%;
            }
        }
    </style>
</head>

<body>

<div id="wrapper">
    <h1>Memorial Day Countdown</h1>
    <div id="countdown">
        <ul>
            <li><span id="days"></span>Days</li>
            <li><span id="hours"></span>Hours</li>
            <li><span id="minutes"></span>Minutes</li>
            <li><span id="seconds"></span>Seconds</li>
        </ul>
    </div>
</div>

<script src="/js/countdown.js"></script>

</body>
</html>
